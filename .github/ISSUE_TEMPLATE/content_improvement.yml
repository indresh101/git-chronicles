name: Content Improvement
description: Suggest a correction, clarification, or improvement to a quest or cheatsheet
labels: ["content"]
body:
  - type: input
    id: page
    attributes:
      label: Quest or cheatsheet
      placeholder: "e.g. Quest 07 - The Conflict of Kingdoms"
    validations:
      required: true

  - type: dropdown
    id: language
    attributes:
      label: Language
      options:
        - French (FR)
        - English (EN)
        - Both
    validations:
      required: true

  - type: dropdown
    id: type
    attributes:
      label: Type of improvement
      options:
        - Typo or grammar fix
        - Incorrect or outdated Git command
        - Unclear explanation
        - Missing information
        - Translation issue
        - Accessibility
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      placeholder: What needs to be changed and why?
    validations:
      required: true

  - type: textarea
    id: suggestion
    attributes:
      label: Suggested fix
      placeholder: If you have a specific wording in mind, paste it here.
