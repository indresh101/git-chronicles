name: Feature Request
description: Suggest a new quest, cheatsheet, or site feature
labels: ["enhancement"]
body:
  - type: dropdown
    id: category
    attributes:
      label: Category
      options:
        - New quest idea
        - New cheatsheet
        - Website feature
        - Verification script improvement
        - New language / translation
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      placeholder: Describe your idea. What problem does it solve? Who would benefit?
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      placeholder: Links, references, examples, mockups...
